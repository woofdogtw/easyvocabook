name: Build and Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  LLVM_COV_VER: v0.6.16
jobs:
  # Android unit tests (Robolectric + Compose UI) — PR and push
  test-android:
    name: Android unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Install Android platform 37
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-37.0" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v3
      - name: Run Android unit tests
        working-directory: kotlin
        run: ./gradlew :app:testDebugUnitTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: kotlin/app/build/reports/tests/testDebugUnitTest/

  # Android instrumented tests on emulator — PR and push
  test-android-instrumented:
    name: Android instrumented tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install Android platform 37 + emulator image
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-37.0" \
            "build-tools;36.0.0" \
            "system-images;android-36;default;x86_64" \
            "emulator"
      - uses: gradle/actions/setup-gradle@v3
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd kotlin && ./gradlew :app:connectedDebugAndroidTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-instrumented-results
          path: kotlin/app/build/reports/androidTests/connected/

  test:
    name: Build and test
    runs-on: ubuntu-24.04
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libdbus-1-dev
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build
        working-directory: rust
        run: cargo build
      - name: Run tests
        working-directory: rust
        run: cargo test

  # Push to main: Android coverage via JaCoCo
  # Android coverage report — push to main only
  coverage-android:
    name: Android coverage
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Install Android platform 37
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-37.0" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v3
      - name: Run Android tests with JaCoCo
        working-directory: kotlin
        run: ./gradlew :app:jacocoTestReport
      - name: Generate Android coverage badge
        run: |
          ANDROID_PCT=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('kotlin/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml').getroot()
          for c in root.iter('counter'):
              if c.get('type') == 'LINE':
                  m, v = int(c.get('missed')), int(c.get('covered'))
                  print(int(v*100/(m+v)) if m+v else 0)
                  break
          ")
          if [ "$ANDROID_PCT" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$ANDROID_PCT" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"android coverage\",\"message\":\"${ANDROID_PCT}%\",\"color\":\"${COLOR}\"}" \
            > kotlin/app/build/reports/jacoco/jacocoTestReport/badge.json
      - uses: actions/upload-artifact@v4
        with:
          name: android-coverage
          path: kotlin/app/build/reports/jacoco/jacocoTestReport/

  # Push to main: coverage report published to GitHub Pages
  coverage:
    name: Coverage
    if: ${{ github.event_name == 'push' }}
    needs: [coverage-android]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libdbus-1-dev
      - name: Install cargo-llvm-cov
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          curl -kLO https://github.com/taiki-e/cargo-llvm-cov/releases/download/${LLVM_COV_VER}/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz
          tar xf cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz
          mv cargo-llvm-cov ~/.cargo/bin/
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run tests with coverage (collect only)
        working-directory: rust
        run: cargo +nightly llvm-cov --no-report
      - name: Generate HTML report
        working-directory: rust
        run: cargo +nightly llvm-cov report --html --output-dir ../coverage
      - name: Generate coverage badge
        working-directory: rust
        run: |
          cargo +nightly llvm-cov report --json --summary-only --output-path ../coverage/coverage.json
          PCT=$(jq '.data[0].totals.lines.percent | floor' ../coverage/coverage.json)
          if [ "$PCT" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" \
            > ../coverage/badge.json
      - name: Download Android coverage report
        uses: actions/download-artifact@v4
        with:
          name: android-coverage
          path: android-coverage/
      - name: Include Android coverage in pages
        run: cp -r android-coverage coverage/android
      - name: Publish coverage to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: coverage
